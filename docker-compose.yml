services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: bam
      POSTGRES_PASSWORD: 123456
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: bin/rails server -b 0.0.0.0
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    ports:
      - "3000:3000"
    environment:
      RAILS_ENV: development
      DB_USERNAME: bam
      DB_PASSWORD: "123456"
      DB_HOST: db
    depends_on:
      - db

volumes:
  postgres_data:
  bundle_cache:
